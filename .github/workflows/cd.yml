name: CD — Release & Docker Image

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on: git tag v1.0.0 && git push --tags

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Run tests before releasing ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  # ── 2. Build & push Docker image to GHCR ─────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Create GitHub Release with auto-generated changelog ───────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      - name: Generate changelog & create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🐳 Docker

            Run without installing Python:
            ```bash
            # Start Postgres first (via Terraform), then:
            docker run -it --rm \
              --env DATABASE_URL=postgresql://trainer_user:trainer_pass_2024@host.docker.internal:5432/english_trainer \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }} quiz
            ```

            ## 📦 Install from source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd english-verb-trainer
            python start.py
            ```
