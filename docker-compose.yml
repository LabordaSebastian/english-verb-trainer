services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: english_trainer
      POSTGRES_USER: trainer_user
      POSTGRES_PASSWORD: trainer_pass_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainer_user -d english_trainer"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  # ── Web App (FastAPI) ───────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://trainer_user:trainer_pass_2024@db:5432/english_trainer
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: english_trainer_pgdata
